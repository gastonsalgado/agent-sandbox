rules:
  # ═══════════════════════════════════════════════════════════
  # GitHub (credentials injected by proxy)
  # ═══════════════════════════════════════════════════════════

  # Git reads
  - match: {domain_contains: "github.com", path_contains: "/info/refs"}
    action: allow
    label: git fetch

  - match: {domain_contains: "github.com", path_contains: "git-upload-pack"}
    action: allow
    label: git pull

  # Git writes
  - match: {domain_contains: "github.com", path_contains: "git-receive-pack"}
    action: approval
    label: git push

  # API reads
  - match: {domain_contains: "github.com", method: GET}
    action: allow
    label: github read

  # GraphQL — mutations require approval (first-match-wins, so mutation rule must be first)
  - match: {domain_contains: "github.com", path_contains: "/graphql", body_contains: "mutation"}
    action: approval
    label: github graphql mutation

  # GraphQL — queries are safe reads
  - match: {domain_contains: "github.com", path_contains: "/graphql"}
    action: allow
    label: github graphql query

  # API writes
  - match: {domain_contains: "github.com", method: POST, path_contains: "/pulls"}
    action: approval
    label: create PR

  - match: {domain_contains: "github.com", method: POST}
    action: approval
    label: github write

  - match: {domain_contains: "github.com", method: PUT}
    action: approval
    label: github update

  - match: {domain_contains: "github.com", method: DELETE}
    action: approval
    label: github delete

  - match: {domain_contains: "github.com", method: PATCH}
    action: approval
    label: github patch

  # Default for github — approval (credentials injected)
  - match: {domain_contains: "github.com"}
    action: approval
    label: github unknown

  # ═══════════════════════════════════════════════════════════
  # GCP (credentials injected by proxy)
  # ═══════════════════════════════════════════════════════════

  # Sensitive services — always require approval
  - match: {domain: "secretmanager.googleapis.com"}
    action: approval
    label: gcp secret manager

  - match: {domain: "iam.googleapis.com"}
    action: approval
    label: gcp iam

  - match: {domain: "cloudkms.googleapis.com"}
    action: approval
    label: gcp kms

  - match: {domain: "sts.googleapis.com"}
    action: approval
    label: gcp security token service

  # OAuth token refresh
  - match: {domain: "oauth2.googleapis.com"}
    action: allow
    label: gcp oauth

  # Logging (POST is used for reads)
  - match: {domain: "logging.googleapis.com"}
    action: allow
    label: gcp logging

  # General reads
  - match: {domain_contains: "googleapis.com", method: GET}
    action: allow
    label: gcp read

  # General writes
  - match: {domain_contains: "googleapis.com", method: POST}
    action: approval
    label: gcp write

  - match: {domain_contains: "googleapis.com", method: PUT}
    action: approval
    label: gcp update

  - match: {domain_contains: "googleapis.com", method: DELETE}
    action: approval
    label: gcp delete

  - match: {domain_contains: "googleapis.com", method: PATCH}
    action: approval
    label: gcp patch

  # Default for GCP — approval (credentials injected)
  - match: {domain_contains: "googleapis.com"}
    action: approval
    label: gcp unknown

  # ═══════════════════════════════════════════════════════════
  # Slack (credentials injected by proxy)
  # ═══════════════════════════════════════════════════════════

  - match: {domain_contains: "slack.com", method: GET}
    action: allow
    label: slack read

  - match: {domain_contains: "slack.com", method: POST}
    action: approval
    label: slack write

  # Default for Slack — approval (credentials injected)
  - match: {domain_contains: "slack.com"}
    action: approval
    label: slack unknown

  # ═══════════════════════════════════════════════════════════
  # Atlassian (credentials injected by proxy)
  # ═══════════════════════════════════════════════════════════

  - match: {domain_contains: "atlassian.com", method: GET}
    action: allow
    label: atlassian read

  - match: {domain_contains: "atlassian.net", method: GET}
    action: allow
    label: atlassian read

  - match: {domain_contains: "atlassian.com", method: POST}
    action: approval
    label: atlassian write

  - match: {domain_contains: "atlassian.net", method: POST}
    action: approval
    label: atlassian write

  - match: {domain_contains: "atlassian.com", method: PUT}
    action: approval
    label: atlassian update

  - match: {domain_contains: "atlassian.net", method: PUT}
    action: approval
    label: atlassian update

  - match: {domain_contains: "atlassian.com", method: DELETE}
    action: approval
    label: atlassian delete

  - match: {domain_contains: "atlassian.net", method: DELETE}
    action: approval
    label: atlassian delete

  # Default for Atlassian — approval (credentials injected)
  - match: {domain_contains: "atlassian.com"}
    action: approval
    label: atlassian unknown

  - match: {domain_contains: "atlassian.net"}
    action: approval
    label: atlassian unknown

  # ═══════════════════════════════════════════════════════════
  # Everything else — passthrough (no credentials injected)
  # ═══════════════════════════════════════════════════════════

  - match: {domain: "*"}
    action: allow
    label: passthrough
