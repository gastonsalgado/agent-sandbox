upstreams:
  atlassian:
    type: http
    url: "https://mcp.atlassian.com/v1/mcp"
    auth:
      source: oauth

  github:
    type: http
    url: "https://api.githubcopilot.com/mcp/"
    auth:
      source: env
      env_var: GITHUB_TOKEN

  slack:
    type: http
    url: "https://mcp.slack.com/mcp"
    auth:
      source: oauth
      oauth:
        clientId: "1601185624273.8899143856786"
        callbackPort: 3118

  memory:
    type: sse
    url: "http://localhost:8182/sse"

  qmd:
    type: http
    url: "http://localhost:8181/mcp"

# Tool-level policies
rules:
  # ═══════════════════════════════════════════════════════════
  # Memory — all operations allowed (internal service, no creds)
  # ═══════════════════════════════════════════════════════════
  - match: {tool_contains: "memory_"}
    action: allow

  # ═══════════════════════════════════════════════════════════
  # QMD — all operations allowed (internal service, no creds)
  # ═══════════════════════════════════════════════════════════
  - match: {tool_contains: "qmd_"}
    action: allow

  # ═══════════════════════════════════════════════════════════
  # Reads — allowed
  # ═══════════════════════════════════════════════════════════
  - match: {tool_contains: "list"}
    action: allow
  - match: {tool_contains: "get"}
    action: allow
  - match: {tool_contains: "describe"}
    action: allow
  - match: {tool_contains: "search"}
    action: allow
  - match: {tool_contains: "read"}
    action: allow

  # ═══════════════════════════════════════════════════════════
  # Writes — need approval
  # ═══════════════════════════════════════════════════════════
  - match: {tool_contains: "create"}
    action: approval
    label: create operation
  - match: {tool_contains: "update"}
    action: approval
    label: update operation
  - match: {tool_contains: "delete"}
    action: approval
    label: delete operation
  - match: {tool_contains: "push"}
    action: approval
    label: push operation
  - match: {tool_contains: "merge"}
    action: approval
    label: merge operation
  - match: {tool_contains: "transition"}
    action: approval
    label: transition operation
  - match: {tool_contains: "send"}
    action: approval
    label: send operation
  - match: {tool_contains: "apply"}
    action: approval
    label: apply operation
  - match: {tool_contains: "deploy"}
    action: approval
    label: deploy operation
  - match: {tool_contains: "edit"}
    action: approval
    label: edit operation
  - match: {tool_contains: "add"}
    action: approval
    label: add operation
  - match: {tool_contains: "comment"}
    action: approval
    label: comment operation

  # ═══════════════════════════════════════════════════════════
  # Default deny
  # ═══════════════════════════════════════════════════════════
  - match: {tool: "*"}
    action: deny
    label: unknown tool
